openapi: 3.1.0

info:
  title: Checkin API
  version: 0.1.0
  description: Checkin API

security:
  - EmailVerifiedSession: []
    CsrfTokenHeader: []
  - NeoShowcaseAuth: []
    CsrfTokenHeader: []

paths:
  /verify-email:
    post:
      summary: isct メールアドレスの確認メールを送信
      security: []
      tags:
        - Auth
      operationId: postVerifyEmail
      parameters:
        - $ref: '#/components/parameters/VerifyEmailRedirect'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostVerifyEmailRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /verify-email/confirm:
    get:
      summary: メール確認トークンの確認ページを表示
      security: []
      tags:
        - Auth
      operationId: getVerifyEmailConfirm
      parameters:
        - name: token
          in: query
          required: true
          description: 確認メールに含まれるワンタイムトークン
          schema:
            type: string
            minLength: 32
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              description: ブラウザや中継に保存させない
              schema:
                type: string
                example: no-store
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: メール確認トークンを消費してログインを完了
      security: []
      tags:
        - Auth
      operationId: postVerifyEmailConfirm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PostVerifyEmailConfirmRequest'
      responses:
        '303':
          description: See Other
          headers:
            Location:
              description: 検証完了後に遷移する相対パス
              schema:
                $ref: '#/components/schemas/RelativeRedirectPath'
            Cache-Control:
              description: ブラウザや中継に保存させない
              schema:
                type: string
                example: no-store
            Set-Cookie:
              description: >
                `__Host-checkin_email_verified_session` と `__Host-checkin_csrf` cookie を発行する。
                `__Host-checkin_csrf` の値は以後の state-changing request で
                `X-CSRF-Token` header にそのままコピーして送る。
              schema:
                type: string
                example: __Host-checkin_email_verified_session=session-token; Path=/; HttpOnly; Secure; SameSite=Lax
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /csrf:
    get:
      summary: CSRF トークン用 cookie を発行
      security: []
      tags:
        - Auth
      operationId: getCsrf
      responses:
        '204':
          description: No Content
          headers:
            Set-Cookie:
              description: >
                `__Host-checkin_csrf` cookie を発行する。state-changing request では、この cookie の値を
                `X-CSRF-Token` header にそのままコピーして送る。
              schema:
                type: string
                example: __Host-checkin_csrf=csrf-token-value; Path=/; Secure; SameSite=Lax

  /invoices:
    get:
      summary: 請求書由来の入金一覧を取得
      description: "請求書情報の閲覧権限を持つユーザーのみアクセス可能です。一般ユーザーの場合は 403 Forbidden を返します。"
      tags:
        - Invoice
      operationId: getInvoices
      security:
        - NeoShowcaseAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
        - name: status
          description: 請求書ステータス
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
        - name: collection_method
          description: 請求書の支払い方法
          in: query
          schema:
            type: string
            enum:
              - charge_automatically
              - send_invoice
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInvoicesResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /webhook/invoice-paid:
    post:
      summary: Webhook の invoice.paid イベントを受け取る
      security: []
      tags:
        - Webhook
      operationId: postWebhookInvoicePaid
      parameters:
        - name: Stripe-Signature
          description: Stripe が送信する認証情報
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeEvent'
      responses:
        '204':
          description: No content
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /checkout/sessions:
    get:
      summary: オンライン決済ページ由来の入金一覧を取得
      description: "決済情報の閲覧権限を持つユーザーのみアクセス可能です。一般ユーザーの場合は 403 Forbidden を返します。"
      tags:
        - CheckoutSession
      operationId: getCheckoutSessions
      security:
        - NeoShowcaseAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
        - name: payment_intent_id
          description: PaymentIntent ID
          in: query
          schema:
            type: string
        - name: status
          description: Checkout Session のステータス
          in: query
          schema:
            type: string
            enum:
              - complete
              - expired
              - open
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCheckoutSessionsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /admin:
    get:
      summary: 管理者の一覧を取得
      description: "管理者リストの閲覧権限を持つユーザーのみアクセス可能です。一般ユーザーの場合は 403 Forbidden を返します。"
      tags:
        - Admin
      operationId: getAdmins
      security:
        - NeoShowcaseAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Admin'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me:
    get:
      summary: ログインユーザーのセッション情報を取得
      tags:
        - User
      operationId: getMe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me/customer:
    get:
      summary: ログインユーザーの顧客情報を取得
      tags:
        - User
      operationId: getMeCustomer
      security:
        - EmailVerifiedSession: []
        - NeoShowcaseAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: ログインユーザーの顧客情報を作成
      tags:
        - User
      operationId: postMeCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMeCustomerRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: ログインユーザーの顧客情報を更新
      tags:
        - User
      operationId: patchMeCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchMeCustomerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me/invoices:
    post:
      summary: 現在の認証セッションに関連付けられた請求書を作成
      tags:
        - User
      operationId: postMeInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMeInvoiceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMeInvoiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products:
    get:
      summary: 商品の一覧を取得
      tags:
        - Product
      operationId: getProducts
      security:
        - EmailVerifiedSession: []
        - NeoShowcaseAuth: []
      parameters:
        - name: active
          description: 有効な商品のみを取得するか、無効な商品のみを取得するかを制御するフィルター
          in: query
          schema:
            type: boolean
            default: true
        - name: ids
          description: 指定した商品IDリストに一致する商品のみをフィルターするリスト
          in: query
          explode: true
          schema:
            type: array
            items:
              type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}:
    patch:
      summary: 商品を更新
      description: "商品情報の更新権限を持つ管理者のみアクセス可能です。一般ユーザーの場合は 403 Forbidden を返します。"
      tags:
        - Product
      operationId: patchProduct
      security:
        - NeoShowcaseAuth: []
        - CsrfTokenHeader: []
      parameters:
        - name: id
          description: 商品ID (Stripe Product ID)
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    EmailVerifiedSession:
      type: apiKey
      in: cookie
      name: __Host-checkin_email_verified_session
      description: メールアドレスの所有権確認によって確立される一時的なセッションCookie
    NeoShowcaseAuth:
      type: apiKey
      in: header
      name: X-Forwarded-User
      description: NeoShowcaseプロキシ環境下で自動付与される信頼済みユーザー認証
    CsrfTokenHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: >
        Double-submit CSRF対策用ヘッダー。
        `/csrf` または `POST /verify-email/confirm` が発行した `__Host-checkin_csrf` cookie の値をそのまま送る。
  parameters:
    VerifyEmailRedirect:
      name: redirect
      in: query
      description: 検証後に遷移する相対パス
      schema:
        $ref: '#/components/schemas/RelativeRedirectPath'
    CustomerId:
      name: customer_id
      in: query
      description: Customer ID
      schema:
        type: string
        example: cus_NeZwdNtLEOXuvB
    SubscriptionId:
      name: subscription_id
      in: query
      description: Subscription ID
      schema:
        type: string
        example: sub_NeZwdNtLEOXuvB
    Limit:
      name: limit
      in: query
      description: 取得件数
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    StartingAfter:
      name: starting_after
      in: query
      description: 指定された ID のオブジェクト以降のオブジェクトを取得
      schema:
        type: string
    EndingBefore:
      name: ending_before
      in: query
      description: 指定された ID のオブジェクト以前のオブジェクトを取得
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found
    InternalServerError:
      description: Internal server error
  schemas:
    RelativeRedirectPath:
      description: "`//` で始まらないアプリ内の相対パス"
      type: string
      pattern: ^/(|[^/].*)$
      example: /membership
    PostVerifyEmailRequest:
      description: Verify email request
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          description: isct email
          format: email
          maxLength: 255
          pattern: ^[^@\s]+@[iI][sS][cC][tT]\.[aA][cC]\.[jJ][pP]$
      required:
        - email
    PostVerifyEmailConfirmRequest:
      description: Verify email confirm request
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 32
      required:
        - token
    PostVerifyEmailResponse:
      description: Verify email start response
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          description: normalized email
        redirect:
          description: validated redirect path
          $ref: '#/components/schemas/RelativeRedirectPath'
      required:
        - email
        - redirect
    Admin:
      description: 管理者の情報
      type: object
      properties:
        id:
          type: string
          description: traQ ID
          example: traP
      required:
        - id
    Customer:
      description: Customer の情報
      type: object
      properties:
        id:
          type: string
          description: Customer ID
          example: cus_NeZwdNtLEOXuvB
        traq_id:
          type: string
          description: traQ ID
          example: traP
        email:
          type: string
          description: Email
          example: jennyrosen@example.com
        name:
          type: string
          description: Name
          example: Jenny Rosen
    PostMeCustomerRequest:
      description: Customer 作成リクエスト
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: 氏名
      required:
        - name
    PatchMeCustomerRequest:
      description: Customer 更新リクエスト (すべてのフィールドはオプショナル)
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          description: 氏名
    PostMeInvoiceRequest:
      description: Invoice 作成リクエスト
      type: object
      additionalProperties: false
      properties:
        product_id:
          type: string
          description: 商品ID (Product ID)
        metadata:
          type: object
          description: 請求書に付与するメタデータ
          additionalProperties: false
          properties:
            traq_id:
              type: string
              description: 再入部等でアカウント復旧の対象となる traQ ID
      required:
        - product_id
    InvoiceStatus:
      description: 請求書ステータス
      type: string
      enum:
        - draft
        - open
        - paid
        - uncollectible
        - void
      example: draft
    PostMeInvoiceResponse:
      description: Invoice creation result
      type: object
      properties:
        invoice_id:
          type: string
          description: Invoice ID
          example: in_1MtHbELkdIwHu7ixl4OzzPMv
        payment_url:
          type: string
          description: Hosted invoice payment URL
          example: https://invoice.stripe.com/...
      required:
        - invoice_id
        - payment_url
    GetInvoicesResponse:
      description: Invoice の情報
      type: object
      properties:
        has_more:
          type: boolean
          description: 次のページがあるか
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Invoice ID
                example: in_1MtHbELkdIwHu7ixl4OzzPMv
              amount_due:
                type: integer
                format: int64
                description: 最終的に支払う金額
                example: 0
              amount_paid:
                type: integer
                format: int64
                description: 支払い済み金額
                example: 0
              amount_remaining:
                type: integer
                format: int64
                description: 支払い残高
                example: 0
              created:
                type: integer
                format: int64
                description: 作成日時 (Unix 時間)
                example: 1680644467
              customer:
                $ref: '#/components/schemas/Customer'
              status:
                $ref: '#/components/schemas/InvoiceStatus'
              payment_intent:
                type:
                  - string
                description: この請求書に関連付けられた PaymentIntent
                example: pi_3MtwBwLkdIwHu7ix28a3tqPa
              product_id:
                type: string
                description: Product ID
                example: prod_NWjs8kKbJWmuuc
    GetCheckoutSessionsResponse:
      description: オンライン決済ページ由来の入金一覧
      type: object
      properties:
        has_more:
          type: boolean
          description: 次のページがあるか
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Checkout Session ID
                example: cs_test_1234567890
              amount_total:
                type: integer
                format: int64
                description: 支払い金額
                example: 2198
              amount_subtotal:
                type: integer
                format: int64
                description: 割引・税金を含まない支払い金額
                example: 1998
              created:
                type: integer
                format: int64
                description: 作成日時 (Unix 時間)
                example: 1679600215
              customer:
                $ref: '#/components/schemas/Customer'
              status:
                type: string
                description: Checkout Session のステータス
                enum:
                  - complete
                  - expired
                  - open
                example: open
              payment_intent:
                type:
                  - string
                description: この Checkout Session に関連付けられた PaymentIntent
                example: pi_3MtwBwLkdIwHu7ix28a3tqPa
              product_id:
                type: string
                description: Product ID
                example: prod_NWjs8kKbJWmuuc
    StripeEvent:
      description: Generic Stripe event payload
      type: object
      additionalProperties: true
    MeResponse:
      description: |
        現在のセッション情報（ログインユーザー情報）
        
        【設計注記】
        OpenAPI 3.1.0 の標準仕様としては `nullable: true` は非推奨であり、本来は `type: [string, "null"]` と定義すべきです。
        しかし、Goの自動生成ツールである `oapi-codegen` (v2.7.x 時点) が OpenAPI 3.1.0 の Union型（型配列）のパースに対応しておらず、
        ビルドエラー (`unhandled Schema type: &[string null]`) になるため、本プロジェクトでは意図的に `nullable: true` を使用しています。
      type: object
      properties:
        email:
          type: string
          format: email
          nullable: true
          description: メールアドレス認証が完了しているセッションの場合にメールアドレスが入る。それ以外は null。
        traq_id:
          type: string
          nullable: true
          description: NeoShowcaseプロキシ認証を経由しているセッションの場合に traQ ID が入る。それ以外は null。
        is_admin:
          type: boolean
          description: 現在のユーザーがシステム管理者権限を持っている場合のみ true。それ以外は false。
        customer_id:
          type: string
          nullable: true
          description: 現在のセッションのユーザーがすでに Stripe Customer として登録されている場合に顧客IDが入る。未登録の場合は null。
      required:
        - email
        - traq_id
        - is_admin
        - customer_id

    Product:
      description: 商品情報
      type: object
      properties:
        id:
          type: string
          description: 商品ID (Stripe Product ID)
          example: prod_NWjs8kKbJWmuuc
        active:
          type: boolean
          description: この商品が新規購入可能かどうか
          example: true
        description:
          type: string
          nullable: true
          description: 商品の説明文
          example: サークルの一般会員向け年会費です。
        metadata:
          type: object
          description: キーと値のペアからなるメタデータ情報
          additionalProperties:
            type: string
        name:
          type: string
          description: 商品名
          example: 年会費 (通常会員)
        price:
          $ref: '#/components/schemas/Price'
      required:
        - id
        - active
        - name
        - price

    Price:
      description: 価格情報
      type: object
      properties:
        id:
          type: string
          description: 価格ID (Stripe Price ID)
          example: price_1MoBy5LkdIwHu7ixZhnattbh
        active:
          type: boolean
          description: この価格が新規購入に使用可能かどうか
          example: true
        currency:
          type: string
          description: 3文字のISO通貨コード (小文字)
          example: jpy
        recurring:
          type: object
          nullable: true
          description: 継続課金の周期や設定情報。単発課金の場合は null
          additionalProperties: false
          properties:
            interval:
              type: string
              enum:
                - day
                - week
                - month
                - year
              description: サブスクリプションが請求される頻度
              example: year
            interval_count:
              type: integer
              description: 請求周期の間隔
              example: 1
          required:
            - interval
            - interval_count
        type:
          type: string
          enum:
            - one_time
            - recurring
          description: 価格が単発購入用か継続購入(サブスクリプション)用か
          example: recurring
        unit_amount:
          type: integer
          format: int64
          nullable: true
          description: 課金される最小通貨単位での単価 (日本円の場合は1円単位)
          example: 2000
      required:
        - id
        - active
        - currency
        - recurring
        - type
        - unit_amount

    GetProductsResponse:
      description: 商品一覧の取得レスポンス
      type: object
      properties:
        has_more:
          type: boolean
          description: 次のページがあるか
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
      required:
        - has_more
        - data

    PatchProductRequest:
      description: 商品更新リクエスト
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        active:
          type: boolean
          description: この商品が新規購入可能かどうか
        description:
          type: string
          nullable: true
          description: 商品の説明文
          maxLength: 500
        metadata:
          type: object
          description: 商品に付与する任意のメタデータ情報。Stripe上の値が上書きされます。
          additionalProperties:
            type: string
        name:
          type: string
          description: 商品名
          maxLength: 100

