openapi: 3.1.0

info:
  title: Checkin API
  version: 0.1.0
  description: Checkin API

paths:
  /verify-email:
    post:
      summary: isct メールアドレスの確認メールを送信
      tags:
        - Auth
      operationId: postVerifyEmail
      parameters:
        - $ref: '#/components/parameters/VerifyEmailRedirect'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailStartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /verify-email/confirm:
    get:
      summary: メール確認トークンの確認ページを表示
      tags:
        - Auth
      operationId: getVerifyEmailConfirm
      parameters:
        - name: token
          in: query
          required: true
          description: 確認メールに含まれるワンタイムトークン
          schema:
            type: string
            minLength: 32
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              description: ブラウザや中継に保存させない
              schema:
                type: string
                example: no-store
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: メール確認トークンを消費してログインを完了
      tags:
        - Auth
      operationId: postVerifyEmailConfirm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailConfirmRequest'
      responses:
        '303':
          description: See Other
          headers:
            Location:
              description: 検証完了後に遷移する相対パス
              schema:
                $ref: '#/components/schemas/RelativeRedirectPath'
            Cache-Control:
              description: ブラウザや中継に保存させない
              schema:
                type: string
                example: no-store
            Set-Cookie:
              description: >
                `__Host-checkin_session` と `__Host-checkin_csrf` cookie を発行する。
                `__Host-checkin_csrf` の値は以後の state-changing request で
                `X-CSRF-Token` header にそのままコピーして送る。
              schema:
                type: string
                example: __Host-checkin_session=session-token; Path=/; HttpOnly; Secure; SameSite=Lax
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /csrf:
    get:
      summary: CSRF トークン用 cookie を発行
      tags:
        - Auth
      operationId: getCsrf
      responses:
        '204':
          description: No Content
          headers:
            Set-Cookie:
              description: >
                `__Host-checkin_csrf` cookie を発行する。state-changing request では、この cookie の値を
                `X-CSRF-Token` header にそのままコピーして送る。
              schema:
                type: string
                example: __Host-checkin_csrf=csrf-token-value; Path=/; Secure; SameSite=Lax
  /customer:
    get:
      summary: Customer を取得
      description: session cookie または信頼済み proxy auth が必要
      tags:
        - Customer
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - name: traq_id
          description: traQ ID
          in: query
          schema:
            type: string
        - name: email
          description: Email
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Customer を作成
      description: session cookie または信頼済み proxy auth が必要。`X-CSRF-Token` も必須
      tags:
        - Customer
      operationId: postCustomer
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Customer を更新
      description: session cookie または信頼済み proxy auth が必要。`X-CSRF-Token` も必須
      tags:
        - Customer
      operationId: patchCustomer
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /invoices:
    get:
      summary: 請求書由来の入金一覧を取得
      tags:
        - Invoice
      operationId: getInvoices
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
        - name: status
          description: 請求書ステータス
          in: query
          schema:
            type: string
            enum:
              - draft
              - open
              - paid
              - uncollectible
              - void
        - name: collection_method
          description: 請求書の支払い方法
          in: query
          schema:
            type: string
            enum:
              - charge_automatically
              - send_invoice
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Invoice を作成
      description: session cookie または信頼済み proxy auth が必要。`X-CSRF-Token` も必須
      tags:
        - Invoice
      operationId: postInvoice
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInvoiceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInvoiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /webhook/invoice-paid:
    post:
      summary: Webhook の invoice.paid イベントを受け取る
      tags:
        - Webhook
      operationId: postWebhookInvoicePaid
      parameters:
        - name: Stripe-Signature
          description: Stripe が送信する認証情報
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeEvent'
      responses:
        '204':
          description: No content
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /list/checkout-sessions:
    get:
      summary: オンライン決済ページ由来の入金一覧を取得
      tags:
        - List
      operationId: getCheckoutSessions
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
        - name: payment_intent_id
          description: PaymentIntent ID
          in: query
          schema:
            type: string
        - name: status
          description: Checkout Session のステータス
          in: query
          schema:
            type: string
            enum:
              - complete
              - expired
              - open
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCheckoutSessionsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /admin:
    get:
      summary: 管理者の一覧を取得
      tags:
        - Admin
      operationId: getAdmins
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Admin'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      description: >
        Double-submit CSRF token。`/csrf` または `POST /verify-email/confirm` が発行した
        `__Host-checkin_csrf` cookie の値をそのまま送る。
      required: true
      schema:
        type: string
        minLength: 16
    VerifyEmailRedirect:
      name: redirect
      in: query
      description: 検証後に遷移する相対パス
      schema:
        $ref: '#/components/schemas/RelativeRedirectPath'
    CustomerId:
      name: customer_id
      in: query
      description: Customer ID
      schema:
        type: string
        example: cus_NeZwdNtLEOXuvB
    SubscriptionId:
      name: subscription_id
      in: query
      description: Subscription ID
      schema:
        type: string
        example: sub_NeZwdNtLEOXuvB
    Limit:
      name: limit
      in: query
      description: 取得件数
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    StartingAfter:
      name: starting_after
      in: query
      description: 指定された ID のオブジェクト以降のオブジェクトを取得
      schema:
        type: string
    EndingBefore:
      name: ending_before
      in: query
      description: 指定された ID のオブジェクト以前のオブジェクトを取得
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found
    InternalServerError:
      description: Internal server error
  schemas:
    RelativeRedirectPath:
      description: "`//` で始まらないアプリ内の相対パス"
      type: string
      pattern: ^/(|[^/].*)$
      example: /membership
    VerifyEmailRequest:
      description: Verify email request
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          description: isct email
          format: email
          maxLength: 255
          pattern: ^[^@\s]+@[iI][sS][cC][tT]\.[aA][cC]\.[jJ][pP]$
      required:
        - email
    VerifyEmailConfirmRequest:
      description: Verify email confirm request
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 32
      required:
        - token
    VerifyEmailStartResponse:
      description: Verify email start response
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          description: normalized email
        redirect:
          description: validated redirect path
          $ref: '#/components/schemas/RelativeRedirectPath'
      required:
        - email
        - redirect
    Admin:
      description: 管理者の情報
      type: object
      properties:
        id:
          type: string
          description: traQ ID
          example: traP
      required:
        - id
    Customer:
      description: Customer の情報
      type: object
      properties:
        id:
          type: string
          description: Customer ID
          example: cus_NeZwdNtLEOXuvB
        traq_id:
          type: string
          description: traQ ID
          example: traP
        email:
          type: string
          description: Email
          example: jennyrosen@example.com
        name:
          type: string
          description: Name
          example: Jenny Rosen
    PostCustomerRequest:
      description: Customer 作成リクエスト
      type: object
      properties:
        email:
          type: string
          description: Email
        name:
          type: string
          description: Name
        traq_id:
          type: string
          description: traQ ID
      required:
        - email
        - name
    PostInvoiceRequest:
      description: Invoice 作成リクエスト
      type: object
      properties:
        customer_id:
          type: string
          description: Customer ID
        product_id:
          type: string
          description: Product ID
      required:
        - customer_id
        - product_id
    CreateInvoiceResponse:
      description: Invoice creation result
      type: object
      properties:
        invoice_id:
          type: string
          description: Invoice ID
          example: in_1MtHbELkdIwHu7ixl4OzzPMv
        payment_url:
          type: string
          description: Hosted invoice payment URL
          example: https://invoice.stripe.com/...
      required:
        - invoice_id
        - payment_url
    Invoice:
      description: Invoice の情報
      type: object
      properties:
        has_more:
          type: boolean
          description: 次のページがあるか
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Invoice ID
                example: in_1MtHbELkdIwHu7ixl4OzzPMv
              amount_due:
                type: integer
                format: int64
                description: 最終的に支払う金額
                example: 0
              amount_paid:
                type: integer
                format: int64
                description: 支払い済み金額
                example: 0
              amount_remaining:
                type: integer
                format: int64
                description: 支払い残高
                example: 0
              created:
                type: integer
                format: int64
                description: 作成日時 (Unix 時間)
                example: 1680644467
              customer:
                $ref: '#/components/schemas/Customer'
              status:
                type: string
                description: 請求書ステータス
                enum:
                  - draft
                  - open
                  - paid
                  - uncollectible
                  - void
                example: draft
              payment_intent:
                type:
                  - string
                description: この請求書に関連付けられた PaymentIntent
                example: pi_3MtwBwLkdIwHu7ix28a3tqPa
              product_id:
                type: string
                description: Product ID
                example: prod_NWjs8kKbJWmuuc
    GetCheckoutSessionsResponse:
      description: オンライン決済ページ由来の入金一覧
      type: object
      properties:
        has_more:
          type: boolean
          description: 次のページがあるか
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Checkout Session ID
                example: cs_test_1234567890
              amount_total:
                type: integer
                format: int64
                description: 支払い金額
                example: 2198
              amount_subtotal:
                type: integer
                format: int64
                description: 割引・税金を含まない支払い金額
                example: 1998
              created:
                type: integer
                format: int64
                description: 作成日時 (Unix 時間)
                example: 1679600215
              customer:
                $ref: '#/components/schemas/Customer'
              status:
                type: string
                description: Checkout Session のステータス
                enum:
                  - complete
                  - expired
                  - open
                example: open
              payment_intent:
                type:
                  - string
                description: この Checkout Session に関連付けられた PaymentIntent
                example: pi_3MtwBwLkdIwHu7ix28a3tqPa
              product_id:
                type: string
                description: Product ID
                example: prod_NWjs8kKbJWmuuc
    StripeEvent:
      description: Generic Stripe event payload
      type: object
      additionalProperties: true

tags:
  - name: Auth
    description: Auth API
  - name: Customer
    description: Customer API
  - name: Invoice
    description: Invoice API
  - name: Webhook
    description: Webhook API
  - name: List
    description: List API
  - name: Admin
    description: Admin API
